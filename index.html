<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Kalkulator</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      font-family: sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    #display {
      width: 100%;
      height: 60px;
      font-size: 2rem;
      text-align: right;
      padding: 0 12px;
      background: #0f3460;
      color: #fff;
      border: none;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 70px);
      gap: 10px;
    }

    button {
      height: 70px;
      font-size: 1.4rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #e94560;
      color: white;
      transition: background 0.2s;
    }

    button:hover {
      background: #c73652;
    }

    button.number {
      background: #0f3460;
    }

    button.number:hover {
      background: #1a4a8a;
    }

    button.equals {
      background: #4caf50;
    }

    button.equals:hover {
      background: #388e3c;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <input type="text" id="display" readonly placeholder="0">
    <div class="buttons">
      <button class="number">7</button>
      <button class="number">8</button>
      <button class="number">9</button>
      <button>+</button>

      <button class="number">4</button>
      <button class="number">5</button>
      <button class="number">6</button>
      <button>-</button>

      <button class="number">1</button>
      <button class="number">2</button>
      <button class="number">3</button>
      <button>*</button>

      <button>C</button>
      <button class="number">0</button>
      <button class="equals">=</button>
      <button>/</button>
    </div>
  </div>
  <div style="margin-top: 16px; color: #aaa; font-size: 0.9rem;">
  ONP: <span id="onp-display" style="color: #e94560;">-</span>
    </div>
  <script src="app.js"></script>
</body>
</html>
